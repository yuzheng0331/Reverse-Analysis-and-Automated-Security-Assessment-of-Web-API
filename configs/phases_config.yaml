# =============================================================================
# Pipeline Phase Configuration
# =============================================================================
# Configuration for all phases of the API security assessment pipeline
# =============================================================================

# Global settings
global:
  project_name: "Web API 前端加密逆向与安全评估"
  version: "1.0.0"
  target_url: "http://encrypt-labs-main/easy.php"
  default_username: "admin"
  default_password: "123456"

# -----------------------------------------------------------------------------
# Phase 0: Environment Setup
# -----------------------------------------------------------------------------
phase0:
  name: "环境准备"
  entry: "phases/phase0_setup_env.ps1"
  outputs:
    - ".venv/"
    - "node_modules/"

# -----------------------------------------------------------------------------
# Phase 1: Baseline Capture
# -----------------------------------------------------------------------------
phase1:
  name: "静态分析"
  entry: "phases/phase1_static_analysis.py"
  core_script: "collect/static_analyze.py"
  outputs:
    - "collect/static_analysis/static_analysis_*.json"

# -----------------------------------------------------------------------------
# Phase 2: JavaScript Collection
# -----------------------------------------------------------------------------
phase2:
  name: "基线骨架生成与 Payload 预填"
  entry: "phases/phase2_prepare_baseline.py"
  core_script: "scripts/init_baselines.py"
  outputs:
    - "baseline_samples/baseline_skeletons_*.json"

# -----------------------------------------------------------------------------
# Phase 3: JavaScript Parsing
# -----------------------------------------------------------------------------
phase3:
  name: "Playwright 动态捕获"
  entry: "phases/phase3_capture.py"
  core_script: "scripts/capture_baseline_playwright.py"
  outputs:
    - "baseline_samples/baseline_skeletons_*.json (validation 回填)"

# -----------------------------------------------------------------------------
# Phase 4: Crypto Detection
# -----------------------------------------------------------------------------
phase4:
  name: "Handler 正确性验证"
  entry: "phases/phase4_verify_handlers.py"
  core_script: "scripts/verify_handlers.py"
  outputs:
    - "baseline_samples/baseline_skeletons_*.json (VERIFIED 状态更新)"

# -----------------------------------------------------------------------------
# Phase 5: Request Replay
# -----------------------------------------------------------------------------
phase5:
  name: "安全评估"
  entry: "phases/phase5_assess.py"
  core_script: "assess/assess_endpoint.py"
  outputs:
    - "assessment_results/assessment_profile_default.json"
    - "assessment_results/assessment_profile_paper_v1.json"

# -----------------------------------------------------------------------------
# Phase 6: Parameter Mutation
# -----------------------------------------------------------------------------
phase6:
  name: "报告与图表生成"
  entry: "phases/phase6_generate_report.py"
  core_scripts:
    - "assess/report_gen.py"
    - "runtime/generate_profile_charts.py"
  outputs:
    - "report/report_profile_paper_v1.html"
    - "report/report_profile_paper_v1.md"
    - "report/report_profile_paper_v1.json"
    - "report/charts/*.png"

# -----------------------------------------------------------------------------
# Pipeline Execution Order
# -----------------------------------------------------------------------------
pipeline:
  sequence:
    - phase0
    - phase1
    - phase2
    - phase3
    - phase4
    - phase5
    - phase6
  full_run_entry: "phases/run_full_pipeline.py"
