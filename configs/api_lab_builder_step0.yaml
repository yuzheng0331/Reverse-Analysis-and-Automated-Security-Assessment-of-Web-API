    # 先抽样写入并测试，通过后再进行全量写入
    sample_size_per_algorithm: 5
    sample_pool_yaml: layer1_sample_pool.yaml
    sample_gate_report: layer1_sample_gate_report.json
    sample_manifest: layer1_sample_write_manifest.json
    full_manifest: layer1_full_write_manifest.json
    api_name_prefix: layer1
    generated_page_php: generated_layer1_sample.php
    generated_js_file: generated_layer1_sample.js
    templates:
      php: easy.php
      js: js/easy.js
    defaults:
      username: test_user
      password: test_pass
      success_username: admin
      success_password: '123456'

  layer2:
    # Layer2 与 layer1 平行写入，避免测试样本串联。
    sample_size_per_algorithm: 5
    sample_pool_yaml: layer2_sample_pool.yaml
    sample_gate_report: layer2_sample_gate_report.json
    sample_manifest: layer2_sample_write_manifest.json
    full_manifest: layer2_full_write_manifest.json
    api_name_prefix: layer2
    generated_page_php: generated_layer2_sample.php
    generated_js_file: generated_layer2_sample.js
    templates:
      php: easy.php
      js: js/easy.js
    defaults:
      username: test_user
      password: test_pass
      success_username: admin
      success_password: '123456'

  layer3:
    sample_size_per_algorithm: 4
    sample_pool_yaml: layer3_sample_pool.yaml
    sample_gate_report: layer3_sample_gate_report.json
    sample_manifest: layer3_sample_write_manifest.json
    full_manifest: layer3_full_write_manifest.json
    api_name_prefix: layer3
    generated_page_php: generated_layer3_sample.php
    generated_js_file: generated_layer3_sample.js
    templates:
      php: easy.php
      js: js/easy.js
    defaults:
      username: test_user
      password: test_pass
      success_username: admin
      success_password: '123456'

